<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#292929" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ColorZap</title>
  </head>
  <body>
    <style>
      body {
        --app-primary-color: #292929;
        --app-primary-font-color: white;
        --app-white: #f5f5f5;
        --app-grey: #7e7e7e;
        --app-cta-color: #ae2448;
        --app-light-grey: #d9d9d9;
        --app-border-radius: 4px;
        --app-header-height: 60px;
        --primary-font-family: "Lexend", "Poppins", system-ui, sans-serif;
        --box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      html,
      body {
        height: 100vh;
        margin: 0;
        padding: 0;
        font-family: var(--primary-font-family);
      }
      body {
        display: flex;
        flex-direction: column;
        background-color: var(--app-white);
      }
    </style>
    <app-enter></app-enter>
    <noscript>Your browser does not support JavaScript!</noscript>
  </body>
</html>
